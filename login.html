<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastre-se | Dolce Lou</title>
  <meta name="description" content="Acesse ou crie sua conta na Dolce Lou.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a class="pular-conteudo" href="#conteudo">Pular para o conteúdo</a>

  <main id="conteudo" class="login">
  
    <div class="login__figura" aria-hidden="true">
      <img src="fotinhas/bolologin.png" alt="">
    </div>

   
    <section class="login__painel" aria-labelledby="acesso-titulo">
      <a class="login__logo logo logo--pequeno" href="index.html" aria-label="Dolce Lou — página inicial">
        <img src="fotinhas/logo (2).png" alt="Logo da Dolce Lou" width="140" height="140">
      </a>

      <h1 class="login__titulo js-titulo-acesso" id="acesso-titulo">Cadastro</h1>
      <p class="login__subtitulo">Insira as informações de acesso.</p>

     
      <form class="formulario" id="formulario-acesso" action="#" method="post" novalidate>
        <div class="campo">
          <label class="campo__rotulo" for="email">E-mail</label>
          <input class="campo__entrada" type="email" id="email" name="email" autocomplete="email"
            placeholder="seuemail@exemplo.com" required>
        </div>

        <div class="campo">
          <label class="campo__rotulo" for="senha">Senha</label>
          <input class="campo__entrada" type="password" id="senha" name="senha" autocomplete="current-password"
            placeholder="Sua senha" required minlength="6">
        </div>

        <div class="campo campo--confirmar">
          <label class="campo__rotulo" for="confirmar-senha">Confirmar senha</label>
          <input class="campo__entrada" type="password" id="confirmar-senha" name="confirmar_senha"
            autocomplete="new-password" placeholder="Repita a senha" required minlength="6">
        </div>

     
        <div class="campo campo--confirmar campo--tipo-conta">
          <label class="campo__rotulo" for="tipo-conta">Tipo de conta</label>
          <select class="campo__entrada" id="tipo-conta" name="acesso" required>
            <option value="COMPRADOR" selected>Cliente</option>
            <option value="FUNCIONARIO">Funcionário</option>
          </select>
        </div>

        <button type="submit" class="botao botao--primario botao--bloco js-enviar-acesso"
          style="margin-top:.5rem">Cadastrar</button>

        <p class="login__alternar">
          <button type="button" class="js-alternar-login">Já tem conta? Entrar</button>
        </p>

        <p class="login__alternar">
          <button type="button" class="js-entrar-convidado">Entrar sem login</button>
        </p>
      </form>
    </section>
  </main>

  <div id="avisos" class="sr-apenas" role="status" aria-live="polite"></div>


  <script src="js/script.js"></script>
</body>

</html>
